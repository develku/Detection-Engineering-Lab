title: Member Added to Administrative Security Group
id: d0a2e7f1-8c3b-4d5e-e6f7-0b1a2c3d4e5f
status: experimental
level: high
description: |
    Detects when a member is added to a privileged security group such as
    Domain Admins, Enterprise Admins, or local Administrators. Attackers add
    compromised accounts to admin groups to escalate privileges and maintain
    persistent elevated access. Event 4728 covers global groups, 4732 covers
    local groups, and 4756 covers universal groups.
references:
    - https://attack.mitre.org/techniques/T1078/002/
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4732
author: Kud Lee
date: 2026/03/19
tags:
    - attack.privilege_escalation
    - attack.persistence
    - attack.t1078.002
logsource:
    product: windows
    service: security
detection:
    selection_events:
        EventID:
            - 4728
            - 4732
            - 4756
    selection_groups:
        TargetUserName|contains:
            - 'Domain Admins'
            - 'Enterprise Admins'
            - 'Schema Admins'
            - 'Administrators'
            - 'Account Operators'
            - 'Server Operators'
            - 'Backup Operators'
            - 'DnsAdmins'
            - 'Group Policy Creator Owners'
    filter_system:
        SubjectUserName|endswith: '$'
    condition: selection_events and selection_groups and not filter_system
falsepositives:
    - Authorized IT personnel managing admin group membership via change management
    - New employee onboarding requiring administrative access
    - Automated provisioning systems adding service accounts
