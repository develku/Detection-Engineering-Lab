title: DCSync Attack via Directory Replication Request
id: c3f5d0e4-1b6a-4c8d-d9e0-3a4f5b6c7d8e
status: experimental
level: critical
description: |
    Detects DCSync attacks by monitoring Event 4662 for directory replication
    access rights (DS-Replication-Get-Changes and DS-Replication-Get-Changes-All).
    DCSync abuses the MS-DRSR protocol to impersonate a domain controller and
    request password hashes from AD. Tools like Mimikatz use lsadump::dcsync
    to perform this attack without executing code on the DC.
references:
    - https://attack.mitre.org/techniques/T1003/006/
    - https://adsecurity.org/?p=1729
    - https://www.thehacker.recipes/ad/movement/credentials/dumping/dcsync
author: Kud Lee
date: 2026/03/19
tags:
    - attack.credential_access
    - attack.t1003.006
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4662
        Properties|contains:
            - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
            - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'
    filter_machine_accounts:
        SubjectUserName|endswith: '$'
    filter_replication_svc:
        SubjectUserName|startswith:
            - 'MSOL_'
            - 'AAD_'
            - 'svc_azuread'
    condition: selection and not filter_machine_accounts and not filter_replication_svc
falsepositives:
    - Legitimate domain controller replication traffic
    - Azure AD Connect synchronization service accounts
    - Authorized third-party backup tools with replication permissions
